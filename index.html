<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>雷霆战机 H5</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020617;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{position:fixed;inset:0}.game{position:fixed;inset:0;background:radial-gradient(circle at 50% 15%,#1e3a8a 0,#071426 42%,#020617 100%)}canvas{display:block;width:100vw;height:100vh;touch-action:none}.ui{position:fixed;left:0;right:0;top:0;padding:max(10px,env(safe-area-inset-top)) 12px 0;pointer-events:none;text-shadow:0 2px 5px #000}.top{display:flex;justify-content:space-between;gap:10px}.panel{background:rgba(2,6,23,.55);border:1px solid rgba(125,211,252,.25);border-radius:12px;padding:8px 10px;backdrop-filter:blur(6px)}.hp{min-width:178px}.hpTxt{display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-bottom:5px}.bar{height:10px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden}.fill{height:100%;width:100%;background:linear-gradient(90deg,#22c55e,#bef264);border-radius:999px}.stats{text-align:right;font-weight:800;font-size:13px;line-height:1.45;white-space:nowrap}.tip{position:fixed;left:50%;bottom:max(12px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(92vw,520px);text-align:center;color:#dbeafe;font-size:12px;line-height:1.5;pointer-events:none}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.38);padding:22px}.card{width:min(92vw,440px);text-align:center;border-radius:22px;padding:22px;background:linear-gradient(180deg,rgba(15,23,42,.94),rgba(2,6,23,.94));border:1px solid rgba(147,197,253,.35);box-shadow:0 20px 70px rgba(0,0,0,.55)}h1{margin:0 0 10px;font-size:30px;letter-spacing:2px;color:#e0f2fe}p{margin:8px 0;color:#cbd5e1}.btn{margin-top:16px;width:100%;border:0;border-radius:999px;padding:13px 18px;color:#04111f;font-size:17px;font-weight:900;background:linear-gradient(90deg,#38bdf8,#a7f3d0,#fde68a);box-shadow:0 0 24px rgba(56,189,248,.35)}.hidden{display:none}
</style>
</head>
<body>
<div class="game"><canvas id="c"></canvas></div>
<div class="ui"><div class="top"><div class="panel hp"><div class="hpTxt"><span>HP</span><span id="hpTxt">200 / 200</span></div><div class="bar"><div id="hpFill" class="fill"></div></div></div><div class="panel stats"><div>分数：<span id="score">0</span></div><div>道具：<span id="items">0</span></div><div>火力：<span id="power">1</span></div></div></div></div>
<div class="tip">拖动屏幕移动战机 · 自动射击 · 血量上限200，每秒回血2，碰撞只扣1血</div>
<div id="overlay" class="overlay"><div class="card"><h1>雷霆战机 H5</h1><p>移动端网页版 · 触屏拖动战机</p><p>小兵死亡掉落1个道具，精英 / Boss 掉落2个</p><p>收集道具提升火力、护盾、清屏、恢复血量</p><button id="start" class="btn">开始战斗</button></div></div>
<script>
(()=>{const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');const hpTxt=document.getElementById('hpTxt'),hpFill=document.getElementById('hpFill'),scoreEl=document.getElementById('score'),itemsEl=document.getElementById('items'),powerEl=document.getElementById('power'),ov=document.getElementById('overlay'),startBtn=document.getElementById('start');let W=0,H=0,dpr=1,last=0,run=false,over=false,stars=[],bullets=[],enemies=[],ebullets=[],items=[],fx=[];const player={x:0,y:0,r:18,hp:200,maxHp:200,power:1,score:0,items:0,shield:0,rapid:0,laser:0,cd:0,hitFlash:0};let spawn=0,bossTimer=28,boss=null,touch=false;
function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cvs.width=W*dpr;cvs.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);player.x=player.x||W/2;player.y=player.y||H*.78;stars=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H,z:.4+Math.random()*1.8}))}addEventListener('resize',resize);resize();
function rnd(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function dist(a,b){let x=a.x-b.x,y=a.y-b.y;return Math.hypot(x,y)}
function reset(){bullets=[];enemies=[];ebullets=[];items=[];fx=[];boss=null;Object.assign(player,{x:W/2,y:H*.78,r:18,hp:200,maxHp:200,power:1,score:0,items:0,shield:0,rapid:0,laser:0,cd:0,hitFlash:0});spawn=0;bossTimer=28;over=false;run=true;ov.classList.add('hidden');last=performance.now();requestAnimationFrame(loop)}
startBtn.onclick=reset;function moveTo(x,y){player.x=clamp(x,20,W-20);player.y=clamp(y,60,H-28)}cvs.addEventListener('touchstart',e=>{e.preventDefault();touch=true;if(!run)reset();let t=e.touches[0];moveTo(t.clientX,t.clientY)},{passive:false});cvs.addEventListener('touchmove',e=>{e.preventDefault();let t=e.touches[0];moveTo(t.clientX,t.clientY)},{passive:false});cvs.addEventListener('touchend',()=>touch=false);cvs.addEventListener('mousemove',e=>{if(!touch&&run)moveTo(e.clientX,e.clientY)});cvs.addEventListener('click',()=>{if(!run)reset()});
function shoot(dt){player.cd-=dt;let rate=player.rapid>0?.085:.15;if(player.cd>0)return;player.cd=rate;let p=player.power,spread=Math.min(p,5),gap=8;for(let i=0;i<spread;i++){let off=(i-(spread-1)/2)*gap;bullets.push({x:player.x+off,y:player.y-24,vx:off*.35,vy:-720,r:3.4,dmg:1+(p>5?1:0)})}if(player.laser>0)bullets.push({x:player.x,y:player.y-30,vx:0,vy:-900,r:7,dmg:3,laser:true})}
function addEnemy(kind='grunt'){let elite=kind==='elite',isBoss=kind==='boss';let e={kind,x:rnd(25,W-25),y:-40,r:isBoss?48:elite?27:18,hp:isBoss?90:elite?12:3,max:isBoss?90:elite?12:3,vy:isBoss?35:rnd(70,130),vx:rnd(-35,35),cd:rnd(.6,1.6),drop:isBoss?2:elite?2:1};if(isBoss){e.x=W/2;e.y=-70;e.vx=55;boss=e}enemies.push(e)}
function dropItem(e,n=e.drop){for(let i=0;i<n;i++)items.push({x:e.x+rnd(-12,12),y:e.y+rnd(-8,8),r:12,vy:rnd(90,135),type:['power','heal','shield','rapid','bomb','laser'][Math.floor(Math.random()*6)],a:0})}
function boom(x,y,c='#38bdf8',n=16){for(let i=0;i<n;i++){let a=rnd(0,Math.PI*2),s=rnd(45,220);fx.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(.25,.75),max:1,c,r:rnd(2,5)})}}
function hitPlayer(){if(player.shield>0)return;player.hp=Math.max(0,player.hp-1);player.hitFlash=.18;if(player.hp<=0)gameOver()}
function gameOver(){run=false;over=true;ov.classList.remove('hidden');ov.querySelector('h1').textContent='战斗结束';ov.querySelectorAll('p')[0].textContent='最终分数：'+Math.floor(player.score);ov.querySelectorAll('p')[1].textContent='点击按钮或屏幕重新开始';ov.querySelectorAll('p')[2].textContent='已按规则：碰撞只扣1血，每秒回血2';startBtn.textContent='重新开始'}
function useItem(t){player.items++;if(t==='power')player.power=Math.min(9,player.power+1);if(t==='heal')player.hp=Math.min(player.maxHp,player.hp+30);if(t==='shield')player.shield=6;if(t==='rapid')player.rapid=8;if(t==='laser')player.laser=7;if(t==='bomb'){enemies.forEach(e=>{e.hp=0;dropItem(e,e.drop);boom(e.x,e.y,'#fbbf24',20);player.score+=e.kind==='grunt'?10:e.kind==='elite'?50:500});enemies=[];boss=null}}
function update(dt){player.hp=Math.min(player.maxHp,player.hp+2*dt);player.shield=Math.max(0,player.shield-dt);player.rapid=Math.max(0,player.rapid-dt);player.laser=Math.max(0,player.laser-dt);player.hitFlash=Math.max(0,player.hitFlash-dt);shoot(dt);spawn-=dt;bossTimer-=dt;if(spawn<=0){spawn=rnd(.45,.8);addEnemy(Math.random()<.16?'elite':'grunt')}if(bossTimer<=0&&!boss){bossTimer=38;addEnemy('boss')}stars.forEach(s=>{s.y+=90*s.z*dt;if(s.y>H){s.y=0;s.x=Math.random()*W}});bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt});bullets=bullets.filter(b=>b.y>-60&&b.x>-30&&b.x<W+30);enemies.forEach(e=>{e.y+=e.vy*dt;e.x+=e.vx*dt;if(e.x<e.r||e.x>W-e.r)e.vx*=-1;if(e.kind==='boss'&&e.y<85)e.y+=45*dt;e.cd-=dt;if(e.cd<=0){e.cd=e.kind==='boss'?.45:rnd(1.2,2.2);ebullets.push({x:e.x,y:e.y+e.r*.7,vx:(player.x-e.x)*.5,vy:220+(e.kind==='boss'?80:0),r:e.kind==='boss'?5:4})}});ebullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt});ebullets=ebullets.filter(b=>b.y<H+40);items.forEach(it=>{it.y+=it.vy*dt;it.a+=dt*5});fx.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vy+=140*dt});fx=fx.filter(p=>p.life>0);
for(let b of bullets)for(let e of enemies)if(e.hp>0&&dist(b,e)<e.r+b.r){e.hp-=b.dmg;b.dead=true;boom(b.x,b.y,b.laser?'#f97316':'#93c5fd',4);break}bullets=bullets.filter(b=>!b.dead);for(let e of enemies){if(e.hp<=0&&!e.dead){e.dead=true;player.score+=e.kind==='grunt'?10:e.kind==='elite'?50:500;dropItem(e);boom(e.x,e.y,e.kind==='boss'?'#fb7185':'#38bdf8',e.kind==='grunt'?18:36);if(e===boss)boss=null}if(!e.dead&&dist(e,player)<e.r+player.r){hitPlayer();e.hp-=1;boom(player.x,player.y,'#ef4444',10)}if(e.y>H+70)e.dead=true}enemies=enemies.filter(e=>!e.dead);for(let b of ebullets)if(dist(b,player)<b.r+player.r){b.dead=true;hitPlayer();boom(player.x,player.y,'#ef4444',8)}ebullets=ebullets.filter(b=>!b.dead);for(let it of items)if(dist(it,player)<it.r+player.r){it.dead=true;useItem(it.type);boom(it.x,it.y,'#a7f3d0',14)}items=items.filter(it=>!it.dead&&it.y<H+40);}
function ship(x,y){ctx.save();ctx.translate(x,y);ctx.fillStyle=player.hitFlash>0?'#fff':'#38bdf8';ctx.shadowColor='#38bdf8';ctx.shadowBlur=18;ctx.beginPath();ctx.moveTo(0,-25);ctx.lineTo(18,20);ctx.lineTo(0,10);ctx.lineTo(-18,20);ctx.closePath();ctx.fill();ctx.fillStyle='#e0f2fe';ctx.fillRect(-5,-6,10,17);ctx.fillStyle='#f97316';ctx.beginPath();ctx.moveTo(-9,18);ctx.lineTo(0,34+rnd(0,6));ctx.lineTo(9,18);ctx.fill();if(player.shield>0){ctx.strokeStyle='rgba(125,211,252,.8)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,31,0,Math.PI*2);ctx.stroke()}ctx.restore()}
function render(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);ctx.fillStyle='#bfdbfe';stars.forEach(s=>{ctx.globalAlpha=.35+s.z*.25;ctx.fillRect(s.x,s.y,s.z*1.6,s.z*8)});ctx.globalAlpha=1;items.forEach(it=>{ctx.save();ctx.translate(it.x,it.y);ctx.rotate(it.a);ctx.shadowBlur=12;ctx.shadowColor='#fde68a';ctx.fillStyle={power:'#facc15',heal:'#22c55e',shield:'#60a5fa',rapid:'#f472b6',bomb:'#fb923c',laser:'#f97316'}[it.type];ctx.beginPath();ctx.arc(0,0,it.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#03131f';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText({power:'火',heal:'血',shield:'盾',rapid:'速',bomb:'爆',laser:'激'}[it.type],0,1);ctx.restore()});bullets.forEach(b=>{ctx.fillStyle=b.laser?'#fb923c':'#e0f2fe';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill()});ctx.shadowBlur=0;enemies.forEach(e=>{ctx.save();ctx.translate(e.x,e.y);ctx.fillStyle=e.kind==='boss'?'#be123c':e.kind==='elite'?'#a855f7':'#ef4444';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=14;ctx.beginPath();ctx.moveTo(0,e.r);ctx.lineTo(e.r,-e.r*.55);ctx.lineTo(0,-e.r*.25);ctx.lineTo(-e.r,-e.r*.55);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillRect(-e.r,e.r+6,e.r*2*(e.hp/e.max),4);ctx.restore()});ebullets.forEach(b=>{ctx.fillStyle='#fca5a5';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill()});fx.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1});ship(player.x,player.y);hpTxt.textContent=Math.floor(player.hp)+' / '+player.maxHp;hpFill.style.width=(player.hp/player.maxHp*100)+'%';scoreEl.textContent=Math.floor(player.score);itemsEl.textContent=player.items;powerEl.textContent=player.power;}
function loop(t){if(!run)return;let dt=Math.min((t-last)/1000,.033);last=t;update(dt);render();requestAnimationFrame(loop)}render();})();
</script>
</body>
</html>
